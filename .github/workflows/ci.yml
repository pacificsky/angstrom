name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Pin the newest installed Xcode so the SDK matches the package's
      # deployment targets (avoids building against a stale default toolchain).
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # The nested `cli/` package (the `angcli` wire-debugging tool) builds
      # against the in-repo library by path. It's isolated from the library
      # build above — library consumers never see it or its dependencies.
      - name: Build CLI
        run: swift build --package-path cli

      - name: Test CLI
        run: swift test --package-path cli
